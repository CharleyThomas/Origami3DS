name: Build and Release Windows Executable

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 2. Install the application dependencies + our new helper tools
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 black flake8

    # 3. THE BUG CATCHER: Scan for critical formatting or syntax errors
    - name: Run Bug Catcher (Flake8)
      run: |
        # This checks for syntax errors and undefined names before building
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 4. THE CODE CLEANER: Automatically format your code python style
    - name: Run Code Cleaner (Black)
      run: |
        black .

    # 5. Fallback placeholder script
    - name: Create Base Script if Empty
      run: |
        if (!(Test-Path main.py)) { Set-Content -Path main.py -Value "print('Origami3DS Engine Initialized')" }

    # 6. Compile main.py into a standalone executable file
    - name: Compile Executable
      run: |
        pyinstaller --onefile --windowed main.py --name Origami3DS

    # 7. Automatically calculate the unique version number
    - name: Set Version Number
      id: versioning
      run: |
        echo "VERSION=1.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

    # 8. Create the Pre-release on GitHub and attach the executable
    - name: Upload to GitHub Pre-Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Origami3DS Dev v1.0.${{ github.run_number }}
        body: |
          Automated Development Build.
          
          ### Code Quality Check:
          * Passed syntax integrity validation.
          * Formatted cleanly with Black.
          
          Compiled on changes to commit: ${{ github.sha }}
        prerelease: true
        files: dist/Origami3DS.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
